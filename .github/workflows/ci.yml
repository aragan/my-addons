name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate Lua addons
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get install -y lua5.4

      - name: Check Lua syntax
        run: |
          failed=0
          while IFS= read -r f; do
            if ! luac5.4 -p "$f"; then
              echo "FAIL: $f"
              failed=1
            fi
          done < <(find . -name "*.lua")
          exit $failed
